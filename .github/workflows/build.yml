name: Build emeroOS27

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Free Up Cloud Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32ncurses5-dev lib32z1-dev libkrb5-dev libgl1-mesa-dev libxml2-utils xsltproc zip zlib1g-dev

      - name: Setup Repo Tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

      - name: Sync Android Source Code
        run: |
          mkdir android-source && cd android-source
          repo init -u https://github.com/LineageOS/android.git -b lineage-20.0 --depth=1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Build ROM
        run: |
          cd android-source
          source build/envsetup.sh
          lunch lineage_arm64-userdebug
          mka bacon -j$(nproc --all)

      - name: Upload Output ROM
        uses: actions/upload-artifact@v3
        with:
          name: emeroOS27-ROM
          path: android-source/out/target/product/*/*.zip
